<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Berry FFLogs Analyzers</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <header class="masthead">
          <div>
            <p class="eyebrow">Berry FFLogs Analyzers</p>
            <h1>Recent FFLogs pulls</h1>
          </div>
        </header>

        <section class="user-panel" aria-labelledby="userPanelTitle">
          <div>
            <p class="eyebrow">User data</p>
            <h2 class="account-title" id="userPanelTitle">FFLogs account</h2>
            <p class="user-summary">
              <span id="authState">Not logged in</span>
              <span class="user-name hidden" id="userName"></span>
            </p>
            <p class="status-line" id="statusLine">Log in with FFLogs to load your latest reports.</p>
          </div>
          <div class="user-actions">
            <button id="loginButton" type="button">Log in to FFLogs</button>
            <button class="ghost-button hidden" id="logoutButton" type="button">Log out</button>
            <button class="ghost-button" id="clearCacheButton" type="button">Clear local cache</button>
            <button class="ghost-button" id="loadTestDataButton" type="button">Use test data</button>
          </div>
        </section>

        <section class="panel report-graph-panel">
          <div class="panel-header">
            <div>
              <h2>Latest reports</h2>
              <p>Recent report volume by pull count.</p>
            </div>
            <span id="reportGraphCount">0 reports</span>
          </div>
          <div class="report-graph" id="reportGraph"></div>
        </section>

        <section class="content-grid">
          <div class="panel">
            <div class="panel-header">
              <h2>Recent sets</h2>
              <span id="sessionCount">0 sets</span>
            </div>
            <div class="session-list" id="sessionList"></div>
          </div>

          <div class="panel detail-panel">
            <div class="panel-header">
              <div>
                <h2 id="detailTitle">Select a set</h2>
                <p id="detailSubtitle">Pull details will appear here.</p>
              </div>
              <span id="pullCount">0 pulls</span>
            </div>
            <div class="pull-list" id="pullList"></div>
          </div>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
